<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { background: var(--flour); padding: 24px; font-family: var(--font-body); }
  .row { display: flex; gap: 24px; align-items: center; }
  .blob-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--bran); }
</style>
</head>
<body>
  <div class="row">
    <div class="blob-wrap">
      <svg width="110" height="110" viewBox="0 0 110 110" fill="none">
        <path d="M55 8 C74 6 98 20 102 42 C106 64 94 86 74 96 C54 106 30 102 16 86 C2 70 4 42 18 24 C28 12 38 10 55 8Z" fill="#1F5AD9"/>
      </svg>
      <span class="label">Azul cobalt</span>
    </div>
    <div class="blob-wrap">
      <svg width="90" height="90" viewBox="0 0 90 90" fill="none">
        <path d="M45 6 C60 4 78 16 80 34 C82 52 72 68 56 76 C40 84 20 80 10 66 C0 52 4 32 14 20 C22 10 32 8 45 6Z" fill="#E6B23C"/>
      </svg>
      <span class="label">Amarillo trigo</span>
    </div>
    <div class="blob-wrap">
      <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
        <path d="M30 4 C40 3 52 10 54 22 C56 34 48 46 36 50 C24 54 10 50 5 40 C0 30 4 16 12 9 C18 4 24 5 30 4Z" fill="#DC7A33"/>
      </svg>
      <span class="label">Naranja chispa</span>
    </div>
    <div style="flex:1; padding-left:12px; border-left:1px solid var(--line);">
      <p style="font-size:12px; color:var(--ink-soft); line-height:1.6;">Formas orgánicas sin esquinas perfectas. Un blob grande azul, uno mediano amarillo, uno pequeño naranja. Proporción 3:2:1. Nunca centrados ni simétricos.</p>
    </div>
  </div>
</body>
</html>
