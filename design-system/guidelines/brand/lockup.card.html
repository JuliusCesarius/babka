<!-- @dsCard group="Brand" viewport="700x140" name="PAN DE HOY — Lockup" subtitle="DM Sans 700 uppercase tracking-widest sobre wheat" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { background: var(--flour); padding: 24px; font-family: var(--font-body); display:flex; align-items:center; gap:32px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--bran); margin-top: 10px; }
</style>
</head>
<body>
  <div>
    <div style="display:inline-flex; align-items:center; gap:10px; background:var(--wheat); border-radius:var(--r-pill); padding:8px 20px;">
      <span style="font-family:var(--font-body); font-weight:700; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink);">PAN DE HOY</span>
    </div>
    <div class="meta">background: --wheat · text: --ink · pill radius · DM Sans 700</div>
  </div>
  <div>
    <div style="display:inline-flex; align-items:center; gap:8px; background:var(--babka-blue); border-radius:var(--r-pill); padding:8px 20px;">
      <span style="font-family:var(--font-body); font-weight:700; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#fff;">AGOTADO</span>
    </div>
    <div class="meta">background: --babka-blue · text: white</div>
  </div>
  <div>
    <div style="display:inline-flex; align-items:center; gap:8px; border:1.5px solid var(--ink); border-radius:var(--r-pill); padding:8px 20px;">
      <span style="font-family:var(--font-body); font-weight:700; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink);">ESPECIAL</span>
    </div>
    <div class="meta">border: --ink · ghost</div>
  </div>
</body>
</html>
