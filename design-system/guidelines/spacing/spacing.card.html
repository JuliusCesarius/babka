<!-- @dsCard group="Spacing" viewport="700x140" name="Escala de espaciado" subtitle="Base 4px — 8 pasos de --space-1 a --space-18" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { background: var(--flour); padding: 24px 20px; font-family: var(--font-body); }
  .row { display: flex; align-items: flex-end; gap: 12px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .block { background: var(--babka-blue); border-radius: 3px; width: 100%; min-width: 12px; }
  .label { font-family: var(--font-mono); font-size: 9px; color: var(--bran); white-space: nowrap; }
  .val   { font-family: var(--font-mono); font-size: 9px; color: var(--ink); }
</style>
</head>
<body>
  <div class="row">
    <div class="step"><div class="block" style="height:4px;"></div><span class="val">4</span><span class="label">--space-1</span></div>
    <div class="step"><div class="block" style="height:8px;"></div><span class="val">8</span><span class="label">--space-2</span></div>
    <div class="step"><div class="block" style="height:12px;"></div><span class="val">12</span><span class="label">--space-3</span></div>
    <div class="step"><div class="block" style="height:16px;"></div><span class="val">16</span><span class="label">--space-4</span></div>
    <div class="step"><div class="block" style="height:24px;"></div><span class="val">24</span><span class="label">--space-6</span></div>
    <div class="step"><div class="block" style="height:32px;"></div><span class="val">32</span><span class="label">--space-8</span></div>
    <div class="step"><div class="block" style="height:48px;"></div><span class="val">48</span><span class="label">--space-12</span></div>
    <div class="step"><div class="block" style="height:72px;"></div><span class="val">72</span><span class="label">--space-18</span></div>
  </div>
</body>
</html>
