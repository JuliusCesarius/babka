<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { background: var(--flour); padding: 24px; font-family: var(--font-body); }
  .row { display: flex; flex-direction: column; gap: 3px; border-bottom: 1px solid var(--line); padding-bottom: 10px; margin-bottom: 10px; }
  .row:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--bran); }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">JetBrains Mono 500 — Token / 13px</div>
    <div style="font-family:var(--font-mono); font-size:13px; color:var(--babka-blue);">--babka-blue: #1F5AD9 · --wheat: #E6B23C</div>
  </div>
  <div class="row">
    <div class="meta">JetBrains Mono 400 — Precio / 20px</div>
    <div style="font-family:var(--font-mono); font-size:20px; font-weight:400; color:var(--ink);">$85 <span style="font-size:13px; color:var(--bran);">MXN</span></div>
  </div>
  <div class="row">
    <div class="meta">JetBrains Mono 400 — Código pedido / 11px</div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--bran); letter-spacing:0.08em;">PEDIDO #2024-0847 · 08 JUN 2026</div>
  </div>
</body>
</html>
