<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { background: var(--flour); padding: 24px; font-family: var(--font-body); }
  .row { display: flex; flex-direction: column; gap: 4px; border-bottom: 1px solid var(--line); padding-bottom: 14px; margin-bottom: 14px; }
  .row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--bran); }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">Fraunces 900 italic — Hero / Wordmark</div>
    <div style="font-family:var(--font-display); font-weight:900; font-style:italic; font-size:56px; line-height:1; color:var(--babka-blue); letter-spacing:-2px;">BABKA</div>
  </div>
  <div class="row">
    <div class="meta">Fraunces 900 — H1 / 40px</div>
    <div style="font-family:var(--font-display); font-weight:900; font-size:40px; line-height:1.1; color:var(--ink);">Pan de masa madre</div>
  </div>
  <div class="row">
    <div class="meta">Fraunces 600 italic — H2 / 32px</div>
    <div style="font-family:var(--font-display); font-weight:600; font-style:italic; font-size:32px; line-height:1.2; color:var(--ink);">El rincón social de Mérida</div>
  </div>
</body>
</html>
